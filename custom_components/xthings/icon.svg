<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="currentColor" opacity="0.1"/>
  
  <!-- Lock icon (U-tec smart lock) -->
  <g transform="translate(128, 128)">
    <!-- Lock body -->
    <rect x="-35" y="-25" width="70" height="85" rx="8" fill="none" stroke="currentColor" stroke-width="8"/>
    
    <!-- Lock shackle/arc -->
    <path d="M -25 -25 A 25 25 0 0 1 25 -25" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Keyhole -->
    <circle cx="0" cy="15" r="6" fill="currentColor"/>
    
    <!-- Dot indicator for smart status -->
    <circle cx="0" cy="50" r="4" fill="currentColor" opacity="0.7"/>
  </g>
</svg>