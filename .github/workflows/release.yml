name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave blank to auto-resolve from PR labels)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve version from Release Drafter
        id: drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Using manual version: ${{ inputs.version }}"
          else
            RESOLVED="${{ steps.drafter.outputs.resolved_version }}"
            echo "version=${RESOLVED}" >> "$GITHUB_OUTPUT"
            echo "Auto-resolved version from PR labels: ${RESOLVED}"
          fi

      - name: Update manifest.json version
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/xthings/manifest.json')
          m = json.loads(p.read_text())
          m['version'] = '${{ steps.version.outputs.version }}'
          p.write_text(json.dumps(m, indent=2) + '\n')
          "

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/xthings/manifest.json
          git diff --cached --quiet && echo "No version change" || {
            git commit -m "Bump version to ${{ steps.version.outputs.version }}"
            git push
          }

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish GitHub release
        uses: release-drafter/release-drafter@v6
        with:
          publish: true
          tag: "v${{ steps.version.outputs.version }}"
          version: "${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
